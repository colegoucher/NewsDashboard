name: pipeline

on:
  schedule:
    # ~7am America/New_York (6am in winter). Odd minutes on purpose: GitHub
    # drops on-the-hour crons under load (it skipped two mornings straight).
    # Vercel cron (vercel.json -> /api/cron) is an independent backup
    # scheduler; the pipeline's 3h idempotence guard makes any combination
    # of firings safe.
    - cron: "23 11 * * *"
    - cron: "41 12 * * *"
  workflow_dispatch:
    inputs:
      manual:
        description: manual semantics (skip the 3h idempotence guard)
        default: "true"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        # Refresh button = manual (always runs). Vercel cron dispatches with
        # manual=false so it gets scheduled semantics (idempotence + toggle).
        run: npx tsx src/pipeline/run.ts ${{ (github.event_name == 'workflow_dispatch' && inputs.manual != 'false') && '--manual' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
