name: pipeline

on:
  schedule:
    # ~8am America/New_York: 12:00 UTC (EDT) and 13:00 UTC (EST). Both slots
    # run; the pipeline itself skips if another run succeeded within 3 hours,
    # so whichever fires first wins and GitHub's cron delays can't cause a
    # missed morning (a strict clock gate did exactly that once).
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: npx tsx src/pipeline/run.ts ${{ github.event_name == 'workflow_dispatch' && '--manual' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
